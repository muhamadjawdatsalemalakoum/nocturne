name: android-apk
on:
  push:
    paths: ["mobile/android/**", ".github/workflows/android.yml"]
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"
      - name: Unit tests (Anywhere wire-protocol vectors gate the APK)
        run: gradle -p mobile/android :app:testDebugUnitTest --no-daemon
      - name: Build debug APK
        run: gradle -p mobile/android assembleDebug --no-daemon
      - name: Rename artifact
        run: cp mobile/android/app/build/outputs/apk/debug/app-debug.apk nocturne-android.apk
      - uses: actions/upload-artifact@v4
        with:
          name: nocturne-android-apk
          path: nocturne-android.apk
      - name: Attach to release (tags)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: nocturne-android.apk
