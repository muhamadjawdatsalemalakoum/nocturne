name: android-apk
# Dev builds: every change to the Android app on main produces a downloadable
# CI artifact (and gates it on the shared wire-protocol unit tests). Tagged,
# published releases are handled by release.yml.
on:
  push:
    paths: ["mobile/android/**", ".github/workflows/android.yml"]
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"
      - name: Unit tests (Anywhere wire-protocol vectors gate the APK)
        run: gradle -p mobile/android :app:testDebugUnitTest --no-daemon
      - name: Build debug APK
        run: gradle -p mobile/android assembleDebug --no-daemon
      - name: Name the APK
        run: cp mobile/android/app/build/outputs/apk/debug/app-debug.apk nocturne-android.apk
      - uses: actions/upload-artifact@v4
        with:
          name: nocturne-android-apk
          path: nocturne-android.apk
